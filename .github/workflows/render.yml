name: PitchPulse Render

on:
  workflow_dispatch:
    inputs:
      html:
        description: 'HTML content (base64 encoded)'
        required: true
        type: string
      project:
        description: 'Project name (e.g. prematch-BRAvARG)'
        required: true
        type: string
      post_text:
        description: 'Post copy text (base64 encoded)'
        required: false
        type: string
      prompt_perplexity:
        description: 'Perplexity prompt (base64 encoded)'
        required: false
        type: string
      prompt_claude:
        description: 'Claude prompt/JSON payload (base64 encoded)'
        required: false
        type: string
      callback_url:
        description: 'Railway webhook URL to notify when done'
        required: false
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout repo ──────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 3. Installa dipendenze sistema ────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libxss1 \
            libxtst6 \
            ffmpeg \
            --no-install-recommends

      # ── 4. Installa HyperFrames ───────────────────────────
      - name: Install HyperFrames
        run: npm install -g hyperframes

      # ── 4b. Installa chrome-headless-shell (render ottimizzato) ──
      - name: Install chrome-headless-shell
        run: |
          npx @puppeteer/browsers install chrome-headless-shell
          # Trova il path e salvalo per lo step render
          CHS_PATH=$(find ~/.cache/puppeteer -name "chrome-headless-shell" -type f 2>/dev/null | head -1)
          echo "chrome-headless-shell trovato: $CHS_PATH"
          echo "CHS_PATH=$CHS_PATH" >> $GITHUB_ENV

      # ── 5. Installa dipendenze progetto ───────────────────
      - name: Install project dependencies
        run: npm install

      # ── 6. Scarica asset da Cloudflare R2 ────────────────
      - name: Download assets from Cloudflare R2
        run: |
          BASE="https://pub-3014d0a8aa084b139613f942b5551b02.r2.dev"

          mkdir -p audio fonts videos

          echo "=== AUDIO ==="
          curl -fSL "$BASE/audio/PP-prematch.mp3"  -o audio/PP-prematch.mp3  && echo "OK PP-prematch.mp3"  || echo "MISS PP-prematch.mp3"
          curl -fSL "$BASE/audio/PP-live.mp3"      -o audio/PP-live.mp3      && echo "OK PP-live.mp3"      || echo "MISS PP-live.mp3"
          curl -fSL "$BASE/audio/PP-postmatch.mp3" -o audio/PP-postmatch.mp3 && echo "OK PP-postmatch.mp3" || echo "MISS PP-postmatch.mp3"
          curl -fSL "$BASE/audio/DD-Prematch.mp3"  -o audio/DD-Prematch.mp3  && echo "OK DD-Prematch.mp3"  || echo "MISS DD-Prematch.mp3"
          curl -fSL "$BASE/audio/DD-live.mp3"      -o audio/DD-live.mp3      && echo "OK DD-live.mp3"      || echo "MISS DD-live.mp3"
          curl -fSL "$BASE/audio/DD-postmatch.mp3" -o audio/DD-postmatch.mp3 && echo "OK DD-postmatch.mp3" || echo "MISS DD-postmatch.mp3"

          echo "=== FONTS ==="
          curl -fSL "$BASE/fonts/BebasNeue-Regular.ttf"    -o fonts/BebasNeue-Regular.ttf    && echo "OK BebasNeue-Regular.ttf"    || echo "MISS BebasNeue-Regular.ttf"
          curl -fSL "$BASE/fonts/BarlowCondensed-Bold.ttf" -o fonts/BarlowCondensed-Bold.ttf && echo "OK BarlowCondensed-Bold.ttf" || echo "MISS BarlowCondensed-Bold.ttf"
          curl -fSL "$BASE/fonts/Barlow-Regular.ttf"       -o fonts/Barlow-Regular.ttf       && echo "OK Barlow-Regular.ttf"       || echo "MISS Barlow-Regular.ttf"
          curl -fSL "$BASE/fonts/Barlow-Medium.ttf"        -o fonts/Barlow-Medium.ttf        && echo "OK Barlow-Medium.ttf"        || echo "MISS Barlow-Medium.ttf"

          echo "=== VIDEOS ==="
          curl -fSL "$BASE/videos/Goal-1.mp4" -o videos/Goal-1.mp4 && echo "OK Goal-1.mp4" || echo "MISS Goal-1.mp4"
          curl -fSL "$BASE/videos/Goal-2.mp4" -o videos/Goal-2.mp4 && echo "OK Goal-2.mp4" || echo "MISS Goal-2.mp4"
          curl -fSL "$BASE/videos/Goal-3.mp4" -o videos/Goal-3.mp4 && echo "OK Goal-3.mp4" || echo "MISS Goal-3.mp4"
          curl -fSL "$BASE/videos/Goal-4.mp4" -o videos/Goal-4.mp4 && echo "OK Goal-4.mp4" || echo "MISS Goal-4.mp4"

          echo "=== TOTALE ==="
          ls -lh audio/ fonts/ videos/

      # ── 7. Crea cartella progetto e decodifica HTML ───────
      - name: Save HTML and text files
        run: |
          PROJECT="${{ github.event.inputs.project }}"
          mkdir -p "$PROJECT"

          # HTML
          echo "${{ github.event.inputs.html }}" | base64 -d > "$PROJECT/index.html"
          echo "index.html scritto: $(wc -c < "$PROJECT/index.html") bytes"

          # Post copy text (opzionale)
          if [ -n "${{ github.event.inputs.post_text }}" ]; then
            echo "${{ github.event.inputs.post_text }}" | base64 -d > "$PROJECT/post.txt"
            echo "post.txt scritto: $(wc -c < "$PROJECT/post.txt") bytes"
          fi

          # Prompt Perplexity (opzionale)
          if [ -n "${{ github.event.inputs.prompt_perplexity }}" ]; then
            echo "${{ github.event.inputs.prompt_perplexity }}" | base64 -d > "$PROJECT/prompt-perplexity.txt"
            echo "prompt-perplexity.txt scritto"
          fi

          # Prompt Claude / JSON payload (opzionale)
          if [ -n "${{ github.event.inputs.prompt_claude }}" ]; then
            echo "${{ github.event.inputs.prompt_claude }}" | base64 -d > "$PROJECT/prompt-claude.txt"
            echo "prompt-claude.txt scritto"
          fi

          # CRITICO: copia audio, fonts e videos DENTRO la cartella progetto
          cp -r audio  "$PROJECT/audio"
          cp -r fonts  "$PROJECT/fonts"
          cp -r videos "$PROJECT/videos"

          echo "=== Struttura progetto ==="
          ls -lh "$PROJECT/"

      # ── 8. Render con HyperFrames ─────────────────────────
      - name: Render MP4
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          HYPERFRAMES_BROWSER_PATH: ${{ env.CHS_PATH }}
        run: |
          PROJECT="${{ github.event.inputs.project }}"

          # Usa chrome-headless-shell se disponibile, altrimenti fallback su chromium
          if [ -n "$CHS_PATH" ] && [ -f "$CHS_PATH" ]; then
            echo "Usando chrome-headless-shell: $CHS_PATH"
            export HYPERFRAMES_BROWSER_PATH="$CHS_PATH"
          else
            echo "chrome-headless-shell non trovato, usando chromium fallback"
            export PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
          fi

          cd "$PROJECT"
          npx hyperframes render . \
            --output "${PROJECT}.mp4" \
            --format mp4

      # ── 9. Upload su Dropbox (tutti i file nella stessa cartella) ──
      - name: Upload to Dropbox
        env:
          DBX_APP_KEY: ${{ secrets.DBX_APP_KEY }}
          DBX_APP_SECRET: ${{ secrets.DBX_APP_SECRET }}
          DBX_REFRESH_TOKEN: ${{ secrets.DBX_REFRESH_TOKEN }}
        run: |
          node -e "
          const fs = require('fs');
          const { Dropbox, DropboxAuth } = require('dropbox');
          const fetch = require('node-fetch');

          (async () => {
            const auth = new DropboxAuth({
              clientId: process.env.DBX_APP_KEY,
              clientSecret: process.env.DBX_APP_SECRET,
              refreshToken: process.env.DBX_REFRESH_TOKEN,
              fetch
            });
            await auth.refreshAccessToken();
            const dbx = new Dropbox({ auth, fetch });

            const project = '${{ github.event.inputs.project }}';
            const dbxFolder = '/' + project;

            // Funzione helper upload
            async function uploadFile(localPath, dbxPath) {
              if (!fs.existsSync(localPath)) {
                console.log('SKIP (non trovato):', localPath);
                return null;
              }
              const content = fs.readFileSync(localPath);
              await dbx.filesUpload({
                path: dbxPath,
                contents: content,
                mode: { '.tag': 'overwrite' },
                autorename: false
              });
              console.log('OK:', dbxPath);
              return dbxPath;
            }

            // 1. MP4 — nome senza pitchpulse-
            const mp4Path = await uploadFile(
              project + '/' + project + '.mp4',
              dbxFolder + '/' + project + '.mp4'
            );

            // 2. Post copy text
            await uploadFile(
              project + '/post.txt',
              dbxFolder + '/post.txt'
            );

            // 3. Prompt Perplexity
            await uploadFile(
              project + '/prompt-perplexity.txt',
              dbxFolder + '/prompt-perplexity.txt'
            );

            // 4. Prompt Claude
            await uploadFile(
              project + '/prompt-claude.txt',
              dbxFolder + '/prompt-claude.txt'
            );

            console.log('Upload completato in:', dbxFolder);

          })().catch(e => { console.error(e); process.exit(1); });
          "

      # ── 10. Notifica Railway (callback) ───────────────────
      - name: Notify Railway
        if: ${{ github.event.inputs.callback_url != '' }}
        run: |
          PROJECT="${{ github.event.inputs.project }}"
          curl -X POST "${{ github.event.inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"ok\",\"project\":\"${PROJECT}\",\"dropbox\":\"/${PROJECT}/\"}"

      # ── 11. Notifica errore su Telegram ───────────────────
      - name: Notify error on Telegram
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="Render fallito: ${{ github.event.inputs.project }}"
