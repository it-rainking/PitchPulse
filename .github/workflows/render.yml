name: PitchPulse Render

on:
  workflow_dispatch:
    inputs:
      html:
        description: 'HTML content to render'
        required: true
        type: string
      project:
        description: 'Project name (e.g. prematch-BRAvARG)'
        required: true
        type: string
      callback_url:
        description: 'Railway webhook URL to notify when done'
        required: false
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Checkout repo (fonts + audio già qui) ──────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 3. Installa dipendenze sistema per Chromium ───────
      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libxss1 \
            libxtst6 \
            ffmpeg \
            --no-install-recommends

            # ── DEBUG TEMPORANEO ──────────────────────────────────
      - name: Debug workflow file
        run: cat .github/workflows/render.yml | grep -A2 "HyperFrames"
        
      # ── 4. Installa HyperFrames ───────────────────────────
      - name: Install HyperFrames
        run: npm install -g hyperframes

      # ── 5. Installa dipendenze progetto ───────────────────
      - name: Install project dependencies
        run: npm install

      # ── 6. Crea cartella progetto e salva HTML ────────────
      - name: Save HTML
        run: |
          mkdir -p ${{ github.event.inputs.project }}
          echo '${{ github.event.inputs.html }}' > ${{ github.event.inputs.project }}/index.html

      # ── 7. Render con HyperFrames ─────────────────────────
      - name: Render MP4
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
        run: |
          cd ${{ github.event.inputs.project }}
          npx hyperframes render . \
            --output ${{ github.event.inputs.project }}.mp4 \
            --format mp4

      # ── 8. Upload su Dropbox ──────────────────────────────
      - name: Upload to Dropbox
        env:
          DBX_APP_KEY: ${{ secrets.DBX_APP_KEY }}
          DBX_APP_SECRET: ${{ secrets.DBX_APP_SECRET }}
          DBX_REFRESH_TOKEN: ${{ secrets.DBX_REFRESH_TOKEN }}
        run: |
          node -e "
          const fs = require('fs');
          const { Dropbox, DropboxAuth } = require('dropbox');
          const fetch = require('node-fetch');

          (async () => {
            const auth = new DropboxAuth({
              clientId: process.env.DBX_APP_KEY,
              clientSecret: process.env.DBX_APP_SECRET,
              refreshToken: process.env.DBX_REFRESH_TOKEN,
              fetch
            });

            await auth.refreshAccessToken();

            const dbx = new Dropbox({ auth, fetch });
            const project = '${{ github.event.inputs.project }}';
            const content = fs.readFileSync(project + '/' + project + '.mp4');

            await dbx.filesUpload({
              path: '/PitchPulse/' + project + '.mp4',
              contents: content,
              mode: { '.tag': 'overwrite' },
              autorename: false
            });

            console.log('✅ Upload completato: /PitchPulse/' + project + '.mp4');
          })();
          "

      # ── 9. Notifica Railway (callback) ────────────────────
      - name: Notify Railway
        if: ${{ github.event.inputs.callback_url != '' }}
        run: |
          curl -X POST "${{ github.event.inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d '{
              "status": "ok",
              "project": "${{ github.event.inputs.project }}",
              "dropbox": "/PitchPulse/${{ github.event.inputs.project }}.mp4"
            }'

      # ── 10. Notifica errore su Telegram ───────────────────
      - name: Notify error on Telegram
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="❌ Render fallito: ${{ github.event.inputs.project }}"
